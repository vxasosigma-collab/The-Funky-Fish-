<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Funky Fish</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0e16;
        color: white;
        overflow-x: hidden;
    }

    /* ANIMATED BACKGROUND */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: radial-gradient(circle at center, #1a1f2e, #0b0e16);
        animation: bgPulse 6s infinite alternate ease-in-out;
        z-index: -1;
    }

    @keyframes bgPulse {
        0% { filter: brightness(1); }
        100% { filter: brightness(1.25); }
    }

    /* LOADING SCREEN */
    #loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0b0e16;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
        animation: fadeOut 1s ease forwards;
        animation-delay: 3s;
    }

    #loader img {
        width: 150px;
        border-radius: 12px;
        animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0); }
    }

    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    /* HEADER */
    header {
        text-align: center;
        padding: 30px 20px;
    }

    header h1 {
        font-size: 40px;
        margin: 0;
        letter-spacing: 2px;
        text-shadow: 0 0 15px cyan;
    }

    /* BUTTONS */
    .btn-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 15px;
    }

    .icon-btn {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #151a28;
        transition: 0.3s;
    }

    .icon-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px cyan;
    }

    .icon-btn img {
        width: 40px;
        height: 40px;
        object-fit: contain;
    }

    /* SPINNING FISH */
    .fish-box {
        width: 250px;
        margin: 40px auto;
        background: #151a28;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,255,255,0.2);
        animation: fadeIn 1.5s ease;
        display: flex;
        justify-content: center;
    }

    .fish-box img {
        width: 100%;
        border-radius: 12px;
        animation: spin 6s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* SECTIONS */
    .section {
        width: 90%;
        max-width: 600px;
        margin: 30px auto;
        background: #151a28;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    .section h2 {
        text-align: center;
        margin-bottom: 15px;
        text-shadow: 0 0 10px cyan;
    }

    .goals p {
        font-size: 18px;
        line-height: 1.6;
        text-align: center;
    }

    .verse {
        font-style: italic;
        font-size: 18px;
        line-height: 1.6;
        text-align: center;
    }
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
    <img src="https://cdn.discordapp.com/attachments/1496638745238175864/1496930007774265584/image0.jpg?ex=69ebac35&is=69ea5ab5&hm=9ecca1aedad42f4ac3bc704f431d32fa4687f2b57f50c29fdc6f3ce95420e67d">
    <h2>Loading...</h2>
</div>

<!-- HEADER -->
<header>
    <h1>The Funky Fish</h1>

    <div class="btn-row">
        <a class="icon-btn" href="https://www.youtube.com/channel/UCvA1NmVQ2MF-rZhUnoRhA4w" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
        </a>

        <a class="icon-btn" href="https://discord.gg/v7DM4myWyt" target="_blank">
            <img src="https://cdn.discordapp.com/attachments/1496805585998581761/1496939804544209027/image.png?ex=69ebb555&is=69ea63d5&hm=9a3c46e575cc1068960eca914bd35a42a07ff4a07435d9ee342d6c6c22520c24">
        </a>
    </div>
</header>

<!-- SPINNING FISH -->
<div class="fish-box">
    <img src="https://cdn.discordapp.com/attachments/1496638745238175864/1496930007774265584/image0.jpg?ex=69ebac35&is=69ea5ab5&hm=9ecca1aedad42f4ac3bc704f431d32fa4687f2b57f50c29fdc6f3ce95420e67d">
</div>

<!-- SUB GOALS -->
<div class="section">
    <h2>Sub Goals</h2>
    <div class="goals">
        <p>
            50 ✅️<br>
            100 ✅️<br>
            150 ✅️<br>
            200 ✅️<br>
            250 ✅️<br>
            300 ✅️<br>
            350 ✅️<br>
            400 ✅️
        </p>
    </div>
</div>

<!-- BIBLE VERSE -->
<div class="section">
    <h2>Favorite Bible Verse</h2>
    <p class="verse">
        “Have I not commanded you? Be strong and courageous.  
        Do not be frightened, and do not be dismayed,  
        for the LORD your God is with you wherever you go.”
    </p>
</div>

</body>
</html>
